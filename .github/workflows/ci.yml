name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Compile project modules
        run: |
          python -m py_compile app/main.py
          python -m py_compile app/clients/http_client.py
          python -m py_compile app/clients/browser_client.py
          python -m py_compile app/clients/resilient_client.py
          python -m py_compile app/core/utils.py
          python -m py_compile app/logger.py
          python -m py_compile app/scrapers/search_scraper.py
          python -m py_compile app/scrapers/detail_scraper.py
          python -m py_compile app/scrapers/normalizers.py
          python -m py_compile app/scrapers/parsers/detail_parser.py
          python -m py_compile app/storage/models.py
          python -m py_compile app/storage/repository.py
          python -m py_compile app/storage/db.py
